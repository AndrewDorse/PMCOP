# Default image follows wallet ACTIVITY (same as Polymarket activity tab), not position-sync only.
# To use position sync instead, set: command: ["python","-m","polymarket_copy_bot.cli","run"]
#
# Deploy: copy .env.example -> .env, fill secrets, then:
#   docker compose up -d --build
#
# State (watch cache, logs) persists in the named volume.

services:
  polymarket-copy-bot:
    build: .
    container_name: polymarket-copy-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - polymarket_state:/app/state

volumes:
  polymarket_state:

# Default: activity_runner run --limit 50 (last 50 deals per wallet per cycle; dedupe via state cache).
# Position-sync only: command: ["python","-m","polymarket_copy_bot.cli","run"]
#
# Deploy: copy .env.example -> .env, fill secrets, then:
#   docker compose up -d --build
#
# State (watch cache, logs) persists in the named volume.

services:
  polymarket-copy-bot:
    build: .
    container_name: polymarket-copy-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - polymarket_state:/app/state

volumes:
  polymarket_state:
